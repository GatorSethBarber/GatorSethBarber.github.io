<!doctype html>
<html lang=en-US>
    <head>
        <meta charset=utf8>
        <title>Blueshift Code</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.22.0/codemirror.min.css">
        <link rel="stylesheet" href="./ayu-mirage.css">
        <!-- Gemini to https://stackoverflow.com/questions/47696873/how-to-change-font-for-the-codemirror-editor#:~:text=.CodeMirror%20*%20%7B%20/*%20%5E%20*/,5%2C4372%2026%2028 -->
        <style>
            body {
                background-color: #322a69;
            }
            .CodeMirror {
                font-size: 1rem;
                height: 95vh
            }
        </style>
    </head>
    <body>
        <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.min.js" crossorigin="anonymous"></script>
        <!-- // Gemini for replacing textarea with div -->
        <div id="edit-area"></div>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.22.0/codemirror.min.js"></script>
        <script src="./custom-clike.js"></script>
        <script>
            const myDiv = document.getElementById('edit-area');
            // Gemini
            const view = CodeMirror(myDiv, {
                value: `task changeTask(LINE_WRITER lw, string message)
: triggerOn(lw)
{
    if(lw.msg == "green" || lw.msg == "red"){
        println("MODE CHANGED TO " + message);
        message = lw.msg;
    }
}

task buttonLog(BUTTON button, string mode, map<string, int> countMap, LINE_WRITER fl)
: triggerOn(button)
{
    if(button.pressed){
        int val = 0;
        if(mode == "red"){
            countMap["red"]++;
        }
        else{
            countMap["green"]++;
        }

        int greenCnt = countMap["green"];
        int redCnt = countMap["red"];

        fl.msg = "Green was pressed " + toString(greenCnt) + " times. " + "Red was pressed " + toString(redCnt) + " times.";
    }
}

task buttonLight(BUTTON button, string mode, LIGHT redLight, LIGHT greenLight)
: triggerOn(button)
{
    if(button.pressed){
        if(mode == "red"){
            redLight.on = true;
        }
        else{
            greenLight.on = true;
        }
    }
    else{
        redLight.on = false;
        greenLight.on = false;
    }
}

setup(){
    LINE_WRITER lw = "CTL::file-file1.txt";
    LINE_WRITER fl = "CTL::file-logfile.txt";
    virtual string mode = "red";
    virtual map<string, int> countMap = {"red" : 0, "green" : 0};

    LIGHT redLight = "rpi::PIN-17";
    LIGHT greenLight = "rpi::PIN-27";
    BUTTON button = "rpi::PIN-21";

    changeTask(lw, mode);
    buttonLog(button, mode, countMap, fl);
    buttonLight(button, mode, redLight, greenLight);
}`, // Initial content
                mode: 'text/x-blueshift',
                theme: 'ayu-mirage',
                styleActiveLine: true
            });
            

        </script>
        <script>
            // Listen for messages from Qualtrics
        window.addEventListener('message', function(event) {
            console.log('Iframe received message:', event.data);
            
            if (event.data.type === 'changeLayout') {
                
            }
            
            if (event.data.type === 'requestScreenshot') {
                // https://www.npmjs.com/package/html-to-image
                htmlToImage
                    .toPng(document.getElementById('edit-area'), { skipFonts: true })
                    .then((dataUrl) => {
                        // https://stackoverflow.com/questions/12238545/how-to-save-an-image-via-javascript
                        // Stjepan Suton
                        const downloadImage = document.createElement("a");
                        document.body.appendChild(downloadImage);
                        downloadImage.setAttribute("download", "TextCodingQ2FreeResponse");
                        downloadImage.href = dataUrl;
                        downloadImage.click();
                        downloadImage.remove();
                    })
                }
        });        
    </script>
    </body>
</html>
