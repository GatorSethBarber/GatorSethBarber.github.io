    <header>
    <div class="align-center">
        <button class="modern-button" id="help-button">?</button>
        <button class="modern-button" id="edit-source">Write to testLoop.blu</button>
        <button class="delete-button" id="delete-element">Delete Selected Element</button>
        <button class="modern-button" id="undo-btn">Undo</button>
        <button class="modern-button" id="redo-btn">Redo</button>
        <label class="switch-container">
            <span class="switch">
                <input type="checkbox" id="draw-switch">
                <span class="slider"></span>
            </span>
            <span class="switch-text">Draw Mode</span>
        </label>
        <label class="switch-container">
            <span class="switch">
                <input type="checkbox" id="path-toggle">
                <span class="slider"></span>
            </span>
            <span class="switch-text">Path Highlight</span>
        </label>
        <label class="switch-container">
            <span class="switch">
                <input type="checkbox" id="err-toggle">
                <span class="slider"></span>
            </span>
            <span class="switch-text">Error</span>
        </label>
        <select id="layout-selector">
            <option value="cose">Layout: CoSE (Default)</option>
            <option value="grid">Layout: Grid</option>
            <option value="circle">Layout: Circle</option>
            <option value="concentric">Layout: Concentric</option>
            <option value="breadthfirst">Layout: Breadth First</option>
            <option value="dagre">Layout: Dagre (Hierarchical)</option>
        </select>
    </div>
    </header>
    <div id="cy"></div>
    <div id="errorWindow" class="selector">
        <div id="loop-error", class="error-warning-item error-error-warning-item" style="display:none;">
            <span>Detected loops</span>
        </div>
        <div id ="race-warning" class="error-warning-item warning-error-warning-item" style="display:none;">
            <span>Detected race condition</span>
        </div>
    </div>
    <div class="selector">
        <p>Click and drag to add tasks</p>
        <div id="task-menu"></div>
    </div>
<div class="selector">
    <div> 
        <p>Click and drag to add devices</p>
        <button class="modern-button" id="add-device">Add Device</button>
        <div id="device-menu"></div>
    </div>
    <div id="info">
        <form class="validated-form" id="device-setup-form">
            <button class="delete-button" id="remove-device">Remove Device</button>
            <label for="setDevice">Device Type: </label>
            <select id = "setDevice" name="devtype"></select>

            <label for="devname">Device ID: </label>
            <input type="text" id="devname" name="devname" required>


            <label for="Controller">Controller: </label>
            <input type="text" id="Controller" name="controller" required>

            <div id="device-parameters"></div>
            
            <button type="submit">Add Device</button>
        </form>
        <div id="code-text" style="display:none">
            <h1 id="code-area-label">Task Definition</h1>
            <textarea id="code-textarea" readonly>int abc = 123;</textarea>
        </div>
    </div>
</div>
