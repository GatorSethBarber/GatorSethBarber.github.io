    <body>
        <textarea id="grammar" style="height:100vh">
task lightTask(LINE_WRITER readFile, LINE_WRITER writeFile, LIGHT led)
: triggerOn(readFile)
{
    if (readFile.msg == "ON") {
        led.on = true;
    }
    else {
        led.on = false;
    }
    writeFile.msg = "GREEN ON";
}

task fileTask(LINE_WRITER readFile, LINE_WRITER writeFile)
: triggerOn(readFile)
{
    if (readFile.msg == "GREEN ON") {
        writeFile.msg = "CONFIRMED ON";
    }
    else {
        writeFile.msg = "CONFIRMED OFF";
    }
}


setup() {
    LINE_WRITER fileOne = "SERVER::file-one.txt";
    LINE_WRITER fileTwo = "SERVER::file-two.txt";
    LIGHT green_led = "RPI::PIN-21"; 
    lightTask(fileOne, fileTwo, green_led);
    fileTask(fileTwo, fileOne);
}</textarea>
        <!-- <script src="https://codemirror.net/codemirror.js"></script> -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.22.0/codemirror.min.js"></script>
        <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.22.0/mode/clike/clike.min.js"></script> -->

        <!-- <script defer src="https://codemirror.net/demo.js"></script> -->

            let editor = CodeMirror.fromTextArea(document.getElementById('grammar'), {
                lineNumbers: true,
                // mode: 'text/x-scala',
                mode: 'text/x-blueshift',
                theme: 'ayu-mirage',
                styleActiveLine: true
            });
