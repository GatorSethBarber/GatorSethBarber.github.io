<!doctype html>
<html lang=en-US>
    <head>
        <meta charset=utf8>
        <title>Blueshift Code</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.22.0/codemirror.min.css">
        <link rel="stylesheet" href="./ayu-mirage.css">
        <!-- Gemini to https://stackoverflow.com/questions/47696873/how-to-change-font-for-the-codemirror-editor#:~:text=.CodeMirror%20*%20%7B%20/*%20%5E%20*/,5%2C4372%2026%2028 -->
        <style>
            body {
                background-color: #322a69;
            }
            .CodeMirror {
                font-size: 1rem;
                height: 95vh
            }
        </style>
    </head>
    <body>
        <textarea id="grammar" style="height:100vh">
task task1(LINE_WRITER lw1, LINE_WRITER lw2)
: triggerOn(lw1)
{
    lw2.msg = "task1" + lw1.msg;
}

task task2(LINE_WRITER lw1, LINE_WRITER lw2)
: triggerOn(lw1)
{
   lw2.msg = "task2" + lw1.msg;
}



setup(){
    LINE_WRITER file1 = "ctl::file-file1.txt";
    LINE_WRITER file2 = "ctl::file-file2.txt";
    task1(file1, file2);
    task2(file1, file2);
}</textarea>
        <!-- <script src="https://codemirror.net/codemirror.js"></script> -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.22.0/codemirror.min.js"></script>
        <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.22.0/mode/clike/clike.min.js"></script> -->
        <script src="./custom-clike.js"></script>
        <!-- <script defer src="https://codemirror.net/demo.js"></script> -->
        <script>
            
            let editor = CodeMirror.fromTextArea(document.getElementById('grammar'), {
                lineNumbers: true,
                // mode: 'text/x-scala',
                mode: 'text/x-blueshift',
                theme: 'ayu-mirage',
                styleActiveLine: true
            });
            // let from = {line: loc.start.line-1, ch: loc.start.column-1 - (loc.start.offset === loc.end.offset)};
            // let to = {line: loc.end.line-1, ch: loc.end.column-1};
            // let from = {line: 1, ch: 10};
            // let to = {line: 1, ch: 40};

            // console.log(editor);

            // Gemini helped
            const codeError = `
                text-underline-offset: 2px;
                text-decoration: wavy;
                text-decoration-line: underline;
                text-decoration-color: red;
            `
            // editor.getDoc().markText(from, to, {css: codeError, title: 'Loop'});

        </script>
    </body>
</html>
